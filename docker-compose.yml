# Root folder docker-compose for the whole project ecosystem

services:
  db:
    image: postgres:16
    container_name: gramvikash_db
    restart: always
    environment:
      POSTGRES_USER: gramvikash_user
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: gramvikash_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gramvikash_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  api:
    build: 
      context: ./gramvikash_api
      dockerfile: Dockerfile
    container_name: gramvikash_api
    restart: always
    command: gunicorn --bind 0.0.0.0:8000 core.wsgi:application
    volumes:
      - ./gramvikash_api:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://gramvikash_user:your_secure_password@db:5432/gramvikash_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis

  worker:
    build: 
      context: ./gramvikash_api
      dockerfile: Dockerfile
    container_name: gramvikash_worker
    restart: always
    command: celery -A core worker --loglevel=info
    volumes:
      - ./gramvikash_api:/app
    environment:
      - DATABASE_URL=postgres://gramvikash_user:your_secure_password@db:5432/gramvikash_db
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - db
      - redis
      - api

  nginx:
    image: nginx:alpine
    container_name: gramvikash_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
