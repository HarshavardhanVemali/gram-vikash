version: 2
updates:
  # Maintain Python dependencies
  - package-ecosystem: "pip"
    directory: "/gramvikash_api"
    schedule:
      interval: "weekly"
    labels:
      - "backend"
      - "dependencies"

  # Maintain Node.js/React Native dependencies
  - package-ecosystem: "npm"
    directory: "/gramvikash"
    schedule:
      interval: "weekly"
    labels:
      - "frontend"
      - "dependencies"

  # Maintain GitHub Actions within workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "dependencies"

  # Maintain Docker configurations
  - package-ecosystem: "docker"
    directory: "/gramvikash_api"
    schedule:
      interval: "weekly"
    labels:
      - "docker"
      - "dependencies"
