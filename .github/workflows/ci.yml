name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend — Python (Django + FastAPI)
  # ─────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint (flake8)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gramvikash_api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: gramvikash_api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        env:
          # Provide dummy values so imports don't fail during static analysis
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "True"
          DATABASE_URL: "sqlite:///ci-test.db"
          REDIS_URL: "redis://localhost:6379/1"
          GEMINI_API_KEY: "ci-placeholder"
          OPENWEATHERMAP_API_KEY: "ci-placeholder"
          AGMARKNET_API_KEY: "ci-placeholder"
          FIREBASE_CREDENTIALS_PATH: "./firebase_admin_sdk.json"
          AWS_ACCESS_KEY_ID: "ci-placeholder"
          AWS_SECRET_ACCESS_KEY: "ci-placeholder"
          AWS_STORAGE_BUCKET_NAME: "ci-placeholder"
          AWS_S3_REGION_NAME: "ap-south-1"
          MSG91_AUTH_KEY: "ci-placeholder"
          DIGILOCKER_CLIENT_ID: "ci-placeholder"
          DIGILOCKER_SECRET: "ci-placeholder"
          ELEVENLABS_API_KEY: "ci-placeholder"
          GOOGLE_MAPS_API_KEY: "ci-placeholder"
        run: |
          # Stop the build on errors (E), warnings (W), and complexity (C)
          # Ignore E501 (line too long) and W503 (line break before operator)
          flake8 . \
            --exclude=venv,migrations,__pycache__ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --count \
            --statistics

  # ─────────────────────────────────────────────
  # Job 2: Backend — Django system check
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend — Django Check
    runs-on: ubuntu-latest
    needs: backend-lint

    defaults:
      run:
        working-directory: gramvikash_api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: gramvikash_api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy firebase_admin_sdk.json
        run: |
          echo '{"type":"service_account","project_id":"ci-test","private_key_id":"ci","private_key":"-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4PAtxxcEFSGQwJLxo2HxBQlJVnx\nzXCxOj1OSnOCEskwFJdMJhG9tZ1QotO0WSJXO0PEe7HkDPXqMRXMrBcXdYMGOuY=\n-----END RSA PRIVATE KEY-----\n","client_email":"ci@ci-test.iam.gserviceaccount.com","client_id":"123","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}' \
          > firebase_admin_sdk.json

      - name: Run Django system check
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "True"
          DATABASE_URL: ""
          REDIS_URL: "redis://localhost:6379/1"
          GEMINI_API_KEY: "ci-placeholder"
          OPENWEATHERMAP_API_KEY: "ci-placeholder"
          AGMARKNET_API_KEY: "ci-placeholder"
          FIREBASE_CREDENTIALS_PATH: "./firebase_admin_sdk.json"
          AWS_ACCESS_KEY_ID: "ci-placeholder"
          AWS_SECRET_ACCESS_KEY: "ci-placeholder"
          AWS_STORAGE_BUCKET_NAME: "ci-bucket"
          AWS_S3_REGION_NAME: "ap-south-1"
          MSG91_AUTH_KEY: "ci-placeholder"
          DIGILOCKER_CLIENT_ID: "ci-placeholder"
          DIGILOCKER_SECRET: "ci-placeholder"
          ELEVENLABS_API_KEY: "ci-placeholder"
          GOOGLE_MAPS_API_KEY: "ci-placeholder"
        run: python manage.py check

  # ─────────────────────────────────────────────
  # Job 3: Frontend — React Native / Expo
  # ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint (ESLint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gramvikash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gramvikash/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create CI env file
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_GEMINI_API_KEY=ci-placeholder
          EXPO_PUBLIC_FIREBASE_API_KEY=ci-placeholder
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=ci-test.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=ci-test
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=ci-test.appspot.com
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=000000000000
          EXPO_PUBLIC_FIREBASE_APP_ID=1:000000000000:web:abc123
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=G-XXXXXXXXXX
          EXPO_PUBLIC_API_URL=http://localhost:8000
          EXPO_PUBLIC_MSG91_WIDGET_ID=ci-placeholder
          EXPO_PUBLIC_MSG91_WIDGET_TOKEN=ci-placeholder
          EXPO_PUBLIC_MSG91_AUTH_KEY=ci-placeholder
          EXPO_PUBLIC_OPENWEATHER_API_KEY=ci-placeholder
          EXPO_PUBLIC_AGMARKNET_API_KEY=ci-placeholder
          EOF

      - name: Check for ESLint config
        id: eslint_check
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc.cjs" ] || [ -f "eslint.config.js" ]; then
            echo "has_eslint=true" >> $GITHUB_OUTPUT
          else
            echo "has_eslint=false" >> $GITHUB_OUTPUT
          fi

      - name: Install ESLint and run lint
        if: steps.eslint_check.outputs.has_eslint == 'true'
        run: npx eslint . --ext .js,.jsx --max-warnings 0

      - name: Verify JS parses without errors (no ESLint config found)
        if: steps.eslint_check.outputs.has_eslint == 'false'
        run: |
          echo "No ESLint config found. Skipping frontend linting."
          echo "We recommend adding 'eslint-config-expo' to your project."
