name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend — Python (Django + FastAPI)
  # ─────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint (flake8)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gramvikash_api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: gramvikash_api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        env:
          # Provide dummy values so imports don't fail during static analysis
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "True"
          DATABASE_URL: "sqlite:///ci-test.db"
          REDIS_URL: "redis://localhost:6379/1"
          GEMINI_API_KEY: "ci-placeholder"
          OPENWEATHERMAP_API_KEY: "ci-placeholder"
          AGMARKNET_API_KEY: "ci-placeholder"
          FIREBASE_CREDENTIALS_PATH: "./firebase_admin_sdk.json"
          AWS_ACCESS_KEY_ID: "ci-placeholder"
          AWS_SECRET_ACCESS_KEY: "ci-placeholder"
          AWS_STORAGE_BUCKET_NAME: "ci-placeholder"
          AWS_S3_REGION_NAME: "ap-south-1"
          MSG91_AUTH_KEY: "ci-placeholder"
          DIGILOCKER_CLIENT_ID: "ci-placeholder"
          DIGILOCKER_SECRET: "ci-placeholder"
          ELEVENLABS_API_KEY: "ci-placeholder"
          GOOGLE_MAPS_API_KEY: "ci-placeholder"
        run: |
          # Stop the build on errors (E), warnings (W), and complexity (C)
          # Ignore E501 (line too long) and W503 (line break before operator)
          flake8 . \
            --exclude=venv,migrations,__pycache__ \
            --max-line-length=120 \
            --ignore=E501,W503,E402 \
            --count \
            --statistics

  # ─────────────────────────────────────────────
  # Job 2: Backend — Django system check
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend — Django Check
    runs-on: ubuntu-latest
    needs: backend-lint

    defaults:
      run:
        working-directory: gramvikash_api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: gramvikash_api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy firebase_admin_sdk.json
        run: |
          echo '{"type":"service_account","project_id":"ci-test","private_key_id":"ci","private_key":"-----BEGIN PRIVATE KEY-----\nMIIEvgIBADANBgkqhkiG9w0BAQEFAASCBKgwggSkAgEAAoIBAQC0v0fJLpmA2bmT\nrxaO2nhDmh3z9nx6Rv8/fp9IPpfFUgCPwki4yzvnm78RWzaL+J1rKgR7kI8wudE6\noGKlnc+kdYM3+3YQ1HM2glePOg4wpYhQAcH3X4584I3wlTzlzsX52QzAz1O0wX34\nx33dCGZujp7ZFQu2d93LvPVvVdt2zq6x11goy7G2AzcpBvnNvrgBNiha2G4ANVVs\n9M2XvYM2xMCFAkF4d7CNUbitN6ZL3wP27D9zKA1VW9ES8JEogSHZlhAfLXnUyZIq\nTTWuW7Jq5qxqBa9z1GGt1ctFdIe2GMef7HyseK8x1I3dmGh1YB3Fgoi7M1Zw454g\no2aIwPEnAgMBAAECggEAII/HIGy3NbnDj2H/B9w+xzr4A2/Xy/WHXUpz6oFwORmF\nRWDEVhoy4A40VS2f/YZb4abvqM0JpscK9OtY6ioscp3C9m5kPjLv0JWZrZFRZh0k\nGfm/FlAOLNwNZhaUonfmPZUHEaMoGsuy5IMX3x54yZkC7+u1MPmWKPKRKq4Ge/gA\nrlDNkstPX7N2lUaDS+i9u4WOnEEO5ikZRIQ3tdg9HsCdkOYprnq5uAXvXdbbqskx\nxuDODvjWazgOqykNZ3vPcKYvuFY2HSBSP/VDpL3wQFJROw0OMsJYyIDpOqB4ukK6\naMOvTEzEpVjzxaTZwYaSdnLQMU8CfDh6mp7890ZEKQKBgQD5o6w4iVidnxlhH3+I\nUtsGcRZd/gvU9TWak8rWoxEzYuaZbM5E9pG3/0tIIt2KttXc/30q/5z+Na1KxONi\nrJaZFJzgodEePDpkowBV6YClbJ/ABCiYyJdVR9hCMl0gk4HcdoiRupMu0zyoJv4q\nH12Q9TJUuusyZvAoDB99QAYzXwKBgQC5Wj5WSJRIRPMs31Iy/cyvVbQ36LGvmW82\n5OJGnh2jfdXidO+pXGkVY0NT6bg7vuiYB+O2xl/Y532nVYyLw27Ki6xjI1Wl4qP8\nP3bcaHDpqoOlPLxUvYx7qvWuYRo2xuz8R9IAN1tAgrnUHY+6u96UCKD63+pjWSCO\nBt0lSTkfOQKBgA5UeORd7fpOUbSjjDyVFQGPqEsI9EDrOoJ/DVu4zJn4iWgxOL34\nsXCwdO/VIIZ/7FLdT6ASQD7Pcf0ixDK72YE8D61NXKWxq2Bvgutrlfjo/VqWYoYy\nrY01rJJQNcxS61dubnR/E0fS1F6KrnhYiJRznsoCWNHx2sNRvtT/wdtdAoGBAKST\nk4wrb7ZnuoAaXrM2FZuNfrKx46umklBslNndJTX40oP8Dp0Tl57M/4gvm005au8q\n+i9dHtfKXBDLbjrfMa2YrV1tj2v2vGKKu3BjL/baV3/NWO/pSia4muLWB1+h6+Tp\npHZasKSsLnJAOVG15KEOtFltnoHOLpDNWWj1BkpJAoGBAO+bUTQflkVaYvzTtwrk\nlywqmwfy4bmVzOpQ/2ZopgpZA7e65Mlh7D7S2fk81L5XAqrfiua5ojNoZY3kLkoy\nihE8L0R68pWX42riXBdkZY234bn91LFhhCobTcyBtSZcdvhYpMSDbf4P1zoPS/op\nlOu3aL2xcn8zHm7pX3Q4TI5A\n-----END PRIVATE KEY-----\n","client_email":"ci@ci-test.iam.gserviceaccount.com","client_id":"123","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.